server:
  port: 8088

spring:
  application:
    name: ai-ecommerce-agent
  config:
    import: optional:classpath:application-secrets.yml
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/jc_agent?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  h2:
    console:
      enabled: true
      path: /h2-console

ai:
  providers:
    openai:
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
      model: ${DEEPSEEK_MODEL:deepseek-chat}
      max-tokens: 4096
      temperature: 0.7
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      base-url: https://api.deepseek.com/v1
      model: deepseek-chat
      max-tokens: 4096
      temperature: 0.7
    image-gen:
      enabled: ${IMAGE_GEN_ENABLED:false}
      api-key: ${IMAGE_GEN_API_KEY:sk-placeholder}
      base-url: ${IMAGE_GEN_BASE_URL:https://dashscope.aliyuncs.com}
      model: ${IMAGE_GEN_MODEL:wanx2.1-t2i-turbo}
      size: ${IMAGE_GEN_SIZE:1024*1024}
      style: auto
      n: 1
  agent:
    max-conversation-rounds: 10
    context-window-size: 20
    tool-call-timeout: 30000
  rag:
    max-results: 5
    min-score: 0.6
    knowledge-base-path: classpath:/knowledge/
    augment-prompt: true

tools:
  search:
    enabled: true
    google-api-key: ${GOOGLE_API_KEY:}
    google-cx: ${GOOGLE_CX:}
  scraper:
    enabled: true
    user-agent: Mozilla/5.0 (compatible; ECommerceAgent/1.0)
  currency:
    enabled: true
    api-url: https://api.exchangerate-api.com/v4/latest/
  seo:
    enabled: true
