server:
  port: 8088

spring:
  application:
    name: ai-ecommerce-agent
  config:
    import: optional:classpath:application-secrets.yml
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/jc_agent?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000
  h2:
    console:
      enabled: true
      path: /h2-console

ai:
  providers:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${OPENAI_MODEL:gpt-5.5}
      max-tokens: 4096
      temperature: 0.7
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      base-url: https://api.deepseek.com/v1
      model: deepseek-chat
      max-tokens: 4096
      temperature: 0.7
    # 图片生成 — 复用 OPENAI_API_KEY，使用专用图片模型
    image-gen:
      enabled: ${IMAGE_GEN_ENABLED:false}
      model: ${IMAGE_GEN_MODEL:gpt-image-2}
      size: ${IMAGE_GEN_SIZE:1024x1024}
      n: 1
  agent:
    max-conversation-rounds: 10
    context-window-size: 20
    tool-call-timeout: 120000
  rag:
    max-results: 5
    min-score: 0.6
    knowledge-base-path: classpath:/knowledge/
    augment-prompt: true
    index-products: true
    max-product-embeddings: ${RAG_MAX_PRODUCT_EMBEDDINGS:0}
    persist-embeddings: true
    embedding-index-path: ${RAG_EMBEDDING_INDEX_PATH:}
    embedding-fingerprint-path: ${RAG_EMBEDDING_FINGERPRINT_PATH:}
    embedding-manifest-path: ${RAG_EMBEDDING_MANIFEST_PATH:}

tools:
  search:
    enabled: true
    google-api-key: ${GOOGLE_API_KEY:}
    google-cx: ${GOOGLE_CX:}
  scraper:
    enabled: true
    user-agent: Mozilla/5.0 (compatible; ECommerceAgent/1.0)
  currency:
    enabled: true
    api-url: https://api.exchangerate-api.com/v4/latest/
  seo:
    enabled: true
